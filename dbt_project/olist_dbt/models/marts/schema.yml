version: 2

models:
  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: mart_rfm_segments
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null
      - name: rfm_segment
        tests:
          - not_null
          - accepted_values:
              values: ['Champions', 'Loyal Customers', 'Recent Customers',
                       'At Risk', 'Lost', 'Potential Loyalists']
                       